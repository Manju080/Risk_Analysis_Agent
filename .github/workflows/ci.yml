name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements-ci.txt

      - name: Run unit tests
        run: pytest tests/test_risk_agent.py -v

      - name: Check imports
        run: |
          python -c "from api.schemas import PortfolioRequest, RiskReport; print('schemas ok')"
          python -c "from agents.risk_agent import calculate_var, calculate_sharpe, calculate_beta; print('risk agent ok')"
          python -c "from core.settings import get_settings; print('settings ok')"

      - name: Lint
        run: |
          pip install flake8
          flake8 agents/ api/ core/ --max-line-length=120 --extend-ignore=E203,E402,E221,E251,E302,E305,E231,E225,E265,W293
